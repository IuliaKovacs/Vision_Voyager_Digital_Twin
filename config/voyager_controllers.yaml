controller_manager:
  ros__parameters:
    update_rate: 50
    voyager_steering_controller:
      type: ackermann_steering_controller/AckermannSteeringController

voyager_steering_controller:
  ros__parameters:
    rear_wheels: ['rear_left_wheel_joint', 'rear_right_wheel_joint']
    front_wheels: ['front_left_steer_joint', 'front_right_steer_joint']
    wheelbase: 0.12
    wheel_separation: 0.1
    wheel_radius: 0.032